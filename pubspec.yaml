name: todo_app_feminino
description: "A beautiful feminine todo app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.9
  lucide_icons_flutter: ^3.1.14
  
  # Navegação e estado
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Requisições HTTP
  dio: ^5.4.0
  
  # Armazenamento local
  shared_preferences: ^2.2.2
  
  # Ícones
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  freezed: ^2.4.5
  freezed_annotation: ^2.4.1
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true